services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lighttask
      POSTGRES_PASSWORD: lighttask
      POSTGRES_DB: lighttask
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lighttask -d lighttask"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://lighttask:lighttask@postgres:5432/lighttask?schema=public
      JWT_SECRET: change-me-in-production
      APP_PORT: 3000
      STORAGE_DIR: /app/storage
    volumes:
      - ./storage:/app/storage
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  postgres-data:
